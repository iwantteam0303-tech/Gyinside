<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디스코드 웹훅 전송기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #36393f;
            color: #dcddde;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2f3136;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: #fff; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #40444b;
            color: #fff;
            border: 1px solid #202225;
            border-radius: 4px;
            padding: 10px;
            box-sizing: border-box;
        }
        input[type="file"] { margin-bottom: 10px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        button {
            width: 100%;
            padding: 10px;
            background-color: #5865f2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #4752c4; }
        #status { margin-top: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>익명 포스트</h2>
    
    <div class="input-group">
        <label>메시지</label>
        <textarea id="message" placeholder="보낼 내용을 입력하세요"></textarea>
    </div>

    <div class="input-group">
        <label>이미지 파일</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="input-group checkbox-group">
        <input type="checkbox" id="embedCheck">
        <label for="embedCheck">임베드(Embed) 모드로 전송</label>
    </div>

    <button onclick="sendMessage()">보내기</button>
    <div id="status"></div>
</div>

<script>
    // 전송할 웹훅 주소
    const webhookUrl = "https://discord.com/api/webhooks/1500518500957945929/1hB8PIJx9rOU970Noyab9cMj3IUtOLNTRl9Z0k9dD3hQ6L4s_1ITEpHtdEEOTXvsBxAM";

    async function sendMessage() {
        const message = document.getElementById('message').value;
        const fileInput = document.getElementById('fileInput');
        const isEmbed = document.getElementById('embedCheck').checked;
        const status = document.getElementById('status');

        if (!message && !fileInput.files[0]) {
            alert("내용을 입력하거나 파일을 선택하세요.");
            return;
        }

        status.innerText = "전송 중...";
        
        const formData = new FormData();
        const payload = {};

        // 1. 메시지 구조 설정
        if (isEmbed) {
            payload.embeds = [{
                description: message,
                color: 5814783
            }];
            if (fileInput.files[0]) {
                payload.embeds[0].image = { url: "attachment://file.png" };
            }
        } else {
            payload.content = message;
        }

        // 2. 파일 및 데이터 조합
        if (fileInput.files[0]) {
            formData.append('file', fileInput.files[0], "file.png");
            formData.append('payload_json', JSON.stringify(payload));
        } else {
            formData.append('payload_json', JSON.stringify(payload));
        }

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                status.innerText = "✅ 전송 성공!";
                document.getElementById('message').value = "";
                fileInput.value = "";
            } else {
                status.innerText = "❌ 전송 실패 (오류 코드: " + response.status + ")";
            }
        } catch (e) {
            status.innerText = "❌ 에러 발생: " + e.message;
        }
    }
</script>

</body>
</html>
